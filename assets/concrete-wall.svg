<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1000" viewBox="0 0 2100 1000">
  <defs>
    <radialGradient id="hole" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#595346"></stop>
      <stop offset="55%" stop-color="#6e685b"></stop>
      <stop offset="100%" stop-color="#8c8678"></stop>
    </radialGradient>
    <linearGradient id="wallGlow" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#c7c1b5"></stop>
      <stop offset="50%" stop-color="#bfb9ad"></stop>
      <stop offset="100%" stop-color="#b7b1a5"></stop>
    </linearGradient>

    
    <filter id="mottle" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011" numOctaves="4" seed="7" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.29  0 0 0 0 0.26  0 0 0 0 0.21  0.78 0 0 0 -0.16"></feColorMatrix>
    </filter>
    <filter id="mottleLight" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="23" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.92  0 0 0 0 0.90  0 0 0 0 0.84  0.66 0 0 0 -0.22"></feColorMatrix>
    </filter>
    
    <filter id="weather" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0072" numOctaves="3" seed="42" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.17  0 0 0 0 0.15  0 0 0 0 0.12  1.7 0 0 0 -0.80"></feColorMatrix>
    </filter>
    <filter id="weather2" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0095" numOctaves="3" seed="67" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.16  0 0 0 0 0.13  1.5 0 0 0 -0.84"></feColorMatrix>
    </filter>
    <filter id="drip" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.055 0.005" numOctaves="2" seed="5" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.19  0 0 0 0 0.17  0 0 0 0 0.13  1.25 0 0 0 -0.66"></feColorMatrix>
    </filter>
    
    <filter id="gritCoarse" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="3" seed="31" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="saturate" values="0.18"></feColorMatrix>
    </filter>
    <filter id="gritMed" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.24" numOctaves="3" seed="14" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="saturate" values="0.16"></feColorMatrix>
    </filter>
    <filter id="grit" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" seed="4" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="saturate" values="0.12"></feColorMatrix>
    </filter>
    <filter id="gritSand" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.3" numOctaves="2" seed="9" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="saturate" values="0.1"></feColorMatrix>
    </filter>
  </defs>

  
  <rect width="2100" height="1000" fill="url(#wallGlow)"></rect>

  
  <rect width="2100" height="1000" filter="url(#mottle)" opacity="0.56"></rect>
  <rect width="2100" height="1000" filter="url(#mottleLight)" opacity="0.5"></rect>
  <rect width="2100" height="1000" filter="url(#weather)" opacity="0.55"></rect>
  <rect width="2100" height="1000" filter="url(#weather2)" opacity="0.4"></rect>
  <rect width="2100" height="1000" filter="url(#drip)" opacity="0.26"></rect>
  <rect width="2100" height="1000" filter="url(#gritCoarse)" opacity="0.1"></rect>
  <rect width="2100" height="1000" filter="url(#gritMed)" opacity="0.16"></rect>
  <rect width="2100" height="1000" filter="url(#grit)" opacity="0.2"></rect>
  <rect width="2100" height="1000" filter="url(#gritSand)" opacity="0.12"></rect>

  
  <g fill="#b4aea2" opacity="0.18">
    <rect x="180" y="0" width="1" height="1000"></rect>
    <rect x="520" y="0" width="1" height="1000"></rect>
    <rect x="880" y="0" width="1" height="1000"></rect>
    <rect x="1240" y="0" width="1" height="1000"></rect>
    <rect x="1600" y="0" width="1" height="1000"></rect>
    <rect x="1950" y="0" width="1" height="1000"></rect>
  </g>

  
  <g>
    <g fill="#b1ab9f" opacity="0.6">
      <rect x="0" y="0" width="2100" height="2"></rect>
      <rect x="0" y="500" width="2100" height="2"></rect>
      <rect x="0" y="0" width="2" height="1000"></rect>
      <rect x="700" y="0" width="2" height="1000"></rect>
      <rect x="1400" y="0" width="2" height="1000"></rect>
    </g>
    <g fill="#cdc8bc" opacity="0.5">
      <rect x="0" y="2" width="2100" height="1"></rect>
      <rect x="0" y="502" width="2100" height="1"></rect>
      <rect x="2" y="0" width="1" height="1000"></rect>
      <rect x="702" y="0" width="1" height="1000"></rect>
      <rect x="1402" y="0" width="1" height="1000"></rect>
    </g>
  </g>

  
  <g opacity="0.82">
    <circle cx="80" cy="70" r="4.6" fill="url(#hole)"></circle><circle cx="620" cy="70" r="4.6" fill="url(#hole)"></circle>
    <circle cx="80" cy="430" r="4.6" fill="url(#hole)"></circle><circle cx="620" cy="430" r="4.6" fill="url(#hole)"></circle>
    <circle cx="780" cy="70" r="4.6" fill="url(#hole)"></circle><circle cx="1320" cy="70" r="4.6" fill="url(#hole)"></circle>
    <circle cx="780" cy="430" r="4.6" fill="url(#hole)"></circle><circle cx="1320" cy="430" r="4.6" fill="url(#hole)"></circle>
    <circle cx="1480" cy="70" r="4.6" fill="url(#hole)"></circle><circle cx="2020" cy="70" r="4.6" fill="url(#hole)"></circle>
    <circle cx="1480" cy="430" r="4.6" fill="url(#hole)"></circle><circle cx="2020" cy="430" r="4.6" fill="url(#hole)"></circle>
    <circle cx="80" cy="570" r="4.6" fill="url(#hole)"></circle><circle cx="620" cy="570" r="4.6" fill="url(#hole)"></circle>
    <circle cx="80" cy="930" r="4.6" fill="url(#hole)"></circle><circle cx="620" cy="930" r="4.6" fill="url(#hole)"></circle>
    <circle cx="780" cy="570" r="4.6" fill="url(#hole)"></circle><circle cx="1320" cy="570" r="4.6" fill="url(#hole)"></circle>
    <circle cx="780" cy="930" r="4.6" fill="url(#hole)"></circle><circle cx="1320" cy="930" r="4.6" fill="url(#hole)"></circle>
    <circle cx="1480" cy="570" r="4.6" fill="url(#hole)"></circle><circle cx="2020" cy="570" r="4.6" fill="url(#hole)"></circle>
    <circle cx="1480" cy="930" r="4.6" fill="url(#hole)"></circle><circle cx="2020" cy="930" r="4.6" fill="url(#hole)"></circle>
  </g>
  <rect width="2100" height="1000" fill="#e5e0d2" opacity="0.10"></rect>
</svg>